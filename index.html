<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>We're Not Really Strangers</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #fff5f5;
      --accent:      #e63946;
      --accent-dark: #c1121f;
      --border:      #ffd6d6;
      --text:        #1a1a1a;
      --text-muted:  #bbb;
      --white:       #ffffff;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      overflow-x: hidden; /* vertical scroll allowed so landscape doesn't clip */
    }

    #app {
      min-height: 100dvh;
      min-height: 100vh; /* fallback */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start; /* flex-start + margin:auto on .screen = centers when fits, scrolls when not */
      padding:
        max(24px, env(safe-area-inset-top))
        max(16px, env(safe-area-inset-right))
        max(24px, env(safe-area-inset-bottom))
        max(16px, env(safe-area-inset-left));
    }

    /* ---- Shared ---- */
    .screen {
      width: 100%; max-width: 420px;
      display: flex; flex-direction: column; align-items: center; gap: 20px;
      margin-block: auto; /* centers vertically when there's space; collapses to 0 when overflowing so scroll works */
    }

    /* Tighter layout in landscape on small screens */
    @media (orientation: landscape) and (max-height: 500px) {
      .screen { gap: 14px; }
      .instructions-body { gap: 8px; }
      .instruction-rule { font-size: 13px; }
    }

    /* ---- Setup Screen ---- */
    .setup-title-sub { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); }
    .setup-title-main { font-size: 28px; font-weight: 700; color: var(--text); }
    .setup-form { width: 100%; display: flex; flex-direction: column; gap: 16px; }
    .field-label { display: block; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .field-input {
      width: 100%; border: 1.5px solid var(--border); border-radius: 8px;
      padding: 12px 14px; background: var(--white); color: var(--text);
      font-size: 16px; font-family: inherit; outline: none;
    }
    .field-input:focus { border-color: var(--accent); }
    .field-input::placeholder { color: var(--text-muted); }
    .qty-row { display: flex; gap: 8px; align-items: stretch; }
    .qty-input {
      flex: 1; border: 1.5px solid var(--border); border-radius: 8px;
      padding: 12px 14px; background: var(--white); color: var(--text);
      font-size: 16px; font-family: inherit; text-align: center; outline: none;
    }
    .qty-input:focus { border-color: var(--accent); }
    .qty-btns { display: flex; flex-direction: column; gap: 4px; }
    .qty-btn {
      border: 1.5px solid var(--border); border-radius: 6px; padding: 4px 12px;
      background: var(--white); color: var(--text); font-size: 14px; cursor: pointer; line-height: 1;
    }
    .qty-btn:active { background: var(--border); }
    .field-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .btn-primary {
      width: 100%; background: var(--accent); color: var(--white);
      border: none; border-radius: 12px; padding: 16px;
      font-size: 15px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer;
    }
    .btn-primary:active { background: var(--accent-dark); }
    .btn-outline {
      width: 100%; background: none; color: var(--accent);
      border: 1.5px solid var(--accent); border-radius: 12px; padding: 14px;
      font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .btn-outline:active { background: var(--border); }

    /* ---- Resume Screen ---- */
    .resume-heading { font-size: 24px; font-weight: 700; color: var(--text); }
    .resume-sub { font-size: 15px; color: var(--text-muted); text-align: center; }

    /* ---- Instructions Screen ---- */
    .instructions-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); font-weight: 700; }
    .instructions-body { width: 100%; display: flex; flex-direction: column; gap: 14px; }
    .instruction-rule { font-size: 14px; line-height: 1.6; color: var(--text); }
    .instruction-rule strong { font-weight: 700; }
    .instruction-divider { width: 100%; height: 1px; background: var(--border); }

    /* ---- Game Screen ---- */
    .game-screen {
      width: 100%; height: 100dvh; height: 100vh;
      display: flex; flex-direction: column; justify-content: space-between;
      padding:
        max(20px, env(safe-area-inset-top))
        0
        max(20px, env(safe-area-inset-bottom));
    }
    .game-top { text-align: center; padding: 0 16px; }
    .level-label { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); font-weight: 700; }
    .for-label { font-size: 15px; font-weight: 600; color: var(--text); margin-top: 6px; }
    .wildcard-badge {
      display: inline-block; border: 1.5px solid var(--accent); color: var(--accent);
      font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      padding: 3px 10px; border-radius: 20px; margin-top: 6px;
    }
    .game-middle {
      flex: 1; display: flex; align-items: center; gap: 0;
      padding: 16px 0;
    }
    .nav-btn {
      width: 64px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: 44px; color: #d4a0a0; background: none; border: none; cursor: pointer;
      height: 100%; padding: 0;
    }
    .nav-btn:disabled { opacity: 0.3; }
    .nav-btn:not(:disabled):active { color: var(--accent); }
    .card-content { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .question-text {
      font-size: clamp(1.15rem, 4.5vw, 1.5rem);
      line-height: 1.6; color: var(--text); text-align: center; max-width: 28ch;
    }
    .question-text.reminder { font-style: italic; color: var(--text); font-size: clamp(1rem, 4vw, 1.3rem); }
    .timer-block { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .timer-display { font-size: 36px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; letter-spacing: 2px; }
    .timer-done { font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }
    .timer-start-btn {
      background: var(--accent); color: var(--white); border: none; border-radius: 10px;
      padding: 10px 28px; font-size: 13px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; cursor: pointer;
    }
    .timer-start-btn:active { background: var(--accent-dark); }
    .game-bottom { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 0 16px; }
    .reroll-btn {
      background: none; border: 1.5px solid var(--border); border-radius: 8px;
      color: var(--accent); font-size: 13px; font-weight: 600; letter-spacing: 1px;
      padding: 8px 20px; cursor: pointer;
    }
    .reroll-btn:active { background: var(--border); }
    .progress { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; font-variant-numeric: tabular-nums; }
    .dig-deeper-row { display: flex; gap: 8px; width: 100%; }
    .dig-btn {
      flex: 1; background: none; border: 1.5px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
      padding: 8px 6px; cursor: pointer; line-height: 1.3; text-align: center;
    }
    .dig-btn:not(:disabled):active { background: var(--border); }
    .dig-btn:disabled { opacity: 0.35; cursor: default; border-color: var(--border); color: var(--text-muted); }

    /* ---- Dig Deeper Banner ---- */
    .dig-banner {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
      background: var(--text); color: var(--white);
      font-size: 13px; font-weight: 600; text-align: center;
      padding: 12px 20px; border-radius: 12px;
      max-width: calc(100% - 48px); width: max-content;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 100;
    }
    .dig-banner.visible { opacity: 1; pointer-events: auto; }

    /* ---- Level Complete / Game Complete / Final Card ---- */
    .end-screen {
      width: 100%; height: 100dvh; height: 100vh;
      background: var(--accent); display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      padding: max(32px, env(safe-area-inset-top)) 24px max(32px, env(safe-area-inset-bottom));
      text-align: center;
    }
    .end-label { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: rgba(255,255,255,0.6); }
    .end-title { font-size: 36px; font-weight: 700; color: var(--white); line-height: 1.2; }
    .end-divider { width: 40px; height: 2px; background: rgba(255,255,255,0.3); border-radius: 2px; }
    .end-message { font-size: 17px; color: rgba(255,255,255,0.85); line-height: 1.6; }
    .final-instruction { font-size: 20px; font-weight: 600; color: var(--white); line-height: 1.7; max-width: 26ch; text-align: center; }
    .btn-end {
      background: var(--white); color: var(--accent);
      border: none; border-radius: 12px; padding: 16px 36px;
      font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; margin-top: 8px;
    }
    .btn-end:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="dig-banner" id="dig-banner"></div>
  <script src="questions.js"></script>
  <script>
    // ── State ────────────────────────────────────────────────
    let playerNames       = { p1: '', p2: '' }
    let questionsPerLevel = 5
    let currentLevel      = 1
    let currentDeck       = []   // { text, type: 'reminder'|'question'|'wildcard', timed?, duration? }
    let currentIndex      = 0
    let remainingPool     = []   // regular questions only
    let p1GoesFirst       = true
    let digDeeper         = { p1: true, p2: true }

    // ── Timer state (local only — not saved to localStorage) ──
    let timerInterval  = null
    let timerRemaining = 0
    let timerRunning   = false
    let timerDone      = false

    // ── Computed max questions per level ─────────────────────
    const levels = [QUESTIONS.level1, QUESTIONS.level2, QUESTIONS.level3]
    const computedMax = Math.min(...levels.map(l => l.questions.length))

    // ── XSS Prevention ───────────────────────────────────────
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))
    }

    // ── Screen router ─────────────────────────────────────────
    // States: 'resume' | 'setup' | 'instructions' | 'game' | 'levelcomplete' | 'finalcard' | 'gamecomplete'
    let screen = 'setup'

    function render() {
      const app = document.getElementById('app')
      if      (screen === 'resume')       { app.innerHTML = renderResume();        bindResume()        }
      else if (screen === 'setup')        { app.innerHTML = renderSetup();         bindSetup()         }
      else if (screen === 'instructions') { app.innerHTML = renderInstructions();  bindInstructions()  }
      else if (screen === 'game')         { app.innerHTML = renderGame();          bindGame()          }
      else if (screen === 'levelcomplete'){ app.innerHTML = renderLevelComplete(); bindLevelComplete() }
      else if (screen === 'finalcard')    { app.innerHTML = renderFinalCard();     bindFinalCard()     }
      else if (screen === 'gamecomplete') { app.innerHTML = renderGameComplete();  bindGameComplete()  }
    }

    // ── Global Listeners (setup once at boot) ─────────────────
    function setupGlobalListeners() {
      let touchStartX = 0, touchStartY = 0, touchHasMoved = false

      document.addEventListener('touchstart', e => {
        touchStartX = e.touches[0].clientX
        touchStartY = e.touches[0].clientY
        touchHasMoved = false
      }, { passive: true })

      document.addEventListener('touchmove', () => { touchHasMoved = true }, { passive: true })

      document.addEventListener('touchend', e => {
        if (screen !== 'game') return
        const dx = e.changedTouches[0].clientX - touchStartX
        const dy = e.changedTouches[0].clientY - touchStartY
        const absDx = Math.abs(dx), absDy = Math.abs(dy)
        if (absDx >= 40 && absDx > absDy) {
          navigate(dx < 0 ? 'next' : 'prev')
        } else if (!touchHasMoved && absDx < 10 && absDy < 10) {
          if (e.target.closest('button')) return
          navigate(e.changedTouches[0].clientX < window.innerWidth / 2 ? 'prev' : 'next')
        }
      })

      document.addEventListener('keydown', e => {
        if (screen !== 'game') return
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown')  navigate('next')
        if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')    navigate('prev')
      })
    }

    // ── Boot ──────────────────────────────────────────────────
    function boot() {
      setupGlobalListeners()
      const saved = localStorage.getItem('wnrs_save')
      screen = saved ? 'resume' : 'setup'
      render()
    }

    // ── Render: Resume ────────────────────────────────────────
    function renderResume() {
      return `
        <div class="screen">
          <div class="resume-heading">Welcome back.</div>
          <div class="resume-sub">You have a game in progress.</div>
          <div style="width:100%;display:flex;flex-direction:column;gap:12px;margin-top:8px">
            <button class="btn-primary" id="continue-btn">Continue</button>
            <button class="btn-outline" id="startover-btn">Start Over</button>
          </div>
        </div>
      `
    }

    // ── Render: Setup ─────────────────────────────────────────
    function renderSetup() {
      const clampedDefault = Math.min(5, computedMax)
      return `
        <div class="screen">
          <div style="text-align:center">
            <div class="setup-title-sub">We're Not Really Strangers</div>
            <div class="setup-title-main">New Game</div>
          </div>
          <div class="setup-form">
            <div>
              <label class="field-label" for="p1">Player 1</label>
              <input class="field-input" id="p1" type="text" placeholder="Enter name..." autocomplete="off" maxlength="20">
            </div>
            <div>
              <label class="field-label" for="p2">Player 2</label>
              <input class="field-input" id="p2" type="text" placeholder="Enter name..." autocomplete="off" maxlength="20">
            </div>
            <div>
              <label class="field-label">Questions per level</label>
              <div class="qty-row">
                <input class="qty-input" id="qty" type="number" value="${clampedDefault}" min="5" max="${computedMax}" readonly>
                <div class="qty-btns">
                  <button class="qty-btn" id="qty-up">▲</button>
                  <button class="qty-btn" id="qty-down">▼</button>
                </div>
              </div>
              <div class="field-hint">Wild cards included automatically · max ${computedMax}</div>
            </div>
            <button class="btn-primary" id="start-btn">Start Game</button>
            <div id="setup-error" style="color:var(--accent);font-size:13px;text-align:center;min-height:18px"></div>
          </div>
        </div>
      `
    }

    // ── Render: Instructions ──────────────────────────────────
    function renderInstructions() {
      return `
        <div class="screen">
          <div class="instructions-label">How to Play</div>
          <div class="instructions-body">
            <div class="instruction-rule"><strong>Stare into each other's eyes. First to blink draws first.</strong></div>
            <div class="instruction-divider"></div>
            <div class="instruction-rule">Player A draws a card. Player B answers. Alternate back and forth.</div>
            <div class="instruction-divider"></div>
            <div class="instruction-rule"><strong>Level 1 — Perception:</strong> Answer the first thing that comes to mind. If your partner guesses wrong, feel free to reveal the actual answer — it's optional.</div>
            <div class="instruction-divider"></div>
            <div class="instruction-rule"><strong>Wild Cards:</strong> Your partner must complete the instructions (unless the card says otherwise).</div>
            <div class="instruction-divider"></div>
            <div class="instruction-rule"><strong>Dig Deeper:</strong> Each player gets one per level. Use it when you feel your partner is holding back.</div>
            <div class="instruction-divider"></div>
            <div class="instruction-rule">The <strong>Final Card</strong> waits at the end. You'll know what to do.</div>
          </div>
          <button class="btn-primary" id="lets-play-btn">Let's Play →</button>
        </div>
      `
    }

    // ── Render: Game ──────────────────────────────────────────
    function cardDirection(index) {
      const isEven = index % 2 === 0
      return (isEven === p1GoesFirst) ? 'p1' : 'p2'
    }

    // Returns "[Asker] asks [Answerer]" — dir is the answerer
    function directionLabel(dir) {
      const answerer = playerNames[dir]
      const asker    = dir === 'p1' ? playerNames.p2 : playerNames.p1
      return `${escapeHtml(asker)} asks ${escapeHtml(answerer)}`
    }

    // True for wild cards that involve both players simultaneously
    function isBothPlayers(text) {
      const t = text.toLowerCase()
      return t.includes('(both players') ||
             t.startsWith('both players') ||
             t.includes('together') ||
             t.includes('each other') ||
             t.includes('secret handshake') ||
             t.includes('staring contest') ||
             t.includes('swap sweaters') ||
             t.includes('rock, paper, scissors')
    }

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60)
      const s = seconds % 60
      return `${m}:${String(s).padStart(2, '0')}`
    }

    function renderGame() {
      const card = currentDeck[currentIndex]
      const total = currentDeck.length
      const dir = cardDirection(currentIndex)
      const isReminder   = card.type === 'reminder'
      const isWildcard   = card.type === 'wildcard'
      const isQuestion   = card.type === 'question'
      const isBothCard   = isWildcard && isBothPlayers(card.text)
      const levelData    = QUESTIONS[`level${currentLevel}`]
      const levelLabel   = `LEVEL ${currentLevel} · ${levelData.name.toUpperCase()}`
      const canReroll    = isQuestion && remainingPool.length > 0
      const isFirst      = currentIndex === 0

      // Timer block (only for timed wildcards)
      let timerBlock = ''
      if (isWildcard && card.timed) {
        if (timerDone) {
          timerBlock = `<div class="timer-block"><div class="timer-done">Time's up!</div></div>`
        } else if (timerRunning) {
          timerBlock = `<div class="timer-block"><div class="timer-display">${formatTime(timerRemaining)}</div></div>`
        } else {
          timerBlock = `<div class="timer-block"><div class="timer-display">${formatTime(card.duration)}</div><button class="timer-start-btn" id="timer-start-btn">Start</button></div>`
        }
      }

      // Dig Deeper buttons (hidden on reminder cards)
      const p1Used = !digDeeper.p1
      const p2Used = !digDeeper.p2
      const digRow = isReminder ? '' : `
        <div class="dig-deeper-row">
          <button class="dig-btn" id="dig-p1-btn" ${p1Used ? 'disabled' : ''}>
            ${escapeHtml(playerNames.p1)}<br>Dig Deeper
          </button>
          <button class="dig-btn" id="dig-p2-btn" ${p2Used ? 'disabled' : ''}>
            ${escapeHtml(playerNames.p2)}<br>Dig Deeper
          </button>
        </div>
      `

      return `
        <div class="game-screen">
          <div class="game-top">
            <div class="level-label">${levelLabel}</div>
            ${isWildcard ? '<div class="wildcard-badge">Wild Card</div>' : ''}
            ${!isReminder && !isBothCard ? `<div class="for-label">${directionLabel(dir)}</div>` : ''}
          </div>
          <div class="game-middle">
            <button class="nav-btn" id="prev-btn" ${isFirst ? 'disabled' : ''}>‹</button>
            <div class="card-content">
              <div class="question-text${isReminder ? ' reminder' : ''}">${escapeHtml(card.text)}</div>
              ${timerBlock}
            </div>
            <button class="nav-btn" id="next-btn">›</button>
          </div>
          <div class="game-bottom">
            ${canReroll ? '<button class="reroll-btn" id="reroll-btn">↺ Re-roll</button>' : '<div style="height:35px"></div>'}
            <div class="progress">${currentIndex + 1} / ${total}</div>
            ${digRow}
          </div>
        </div>
      `
    }

    // ── Render: Level Complete ────────────────────────────────
    // Only called after Level 1 and Level 2; never called after Level 3
    function renderLevelComplete() {
      const level = QUESTIONS[`level${currentLevel}`]
      const nextLevel = currentLevel + 1
      const nextLevelData = QUESTIONS[`level${nextLevel}`]
      if (!nextLevelData) return '' // guard: should never reach here for Level 3
      return `
        <div class="end-screen">
          <div class="end-label">Level ${currentLevel} Complete</div>
          <div class="end-title">${escapeHtml(level.name)}</div>
          <div class="end-divider"></div>
          <div class="end-message">Ready to go deeper,<br>${escapeHtml(playerNames.p1)} &amp; ${escapeHtml(playerNames.p2)}?</div>
          <button class="btn-end" id="next-level-btn">
            Level ${nextLevel}: ${escapeHtml(nextLevelData.name)} →
          </button>
        </div>
      `
    }

    // ── Render: Final Card ────────────────────────────────────
    function renderFinalCard() {
      return `
        <div class="end-screen">
          <div class="end-label">Final Card</div>
          <div class="end-divider"></div>
          <div class="final-instruction">${escapeHtml(QUESTIONS.finalCard)}</div>
          <div class="end-divider"></div>
          <button class="btn-end" id="continue-final-btn">Continue</button>
        </div>
      `
    }

    // ── Render: Game Complete ─────────────────────────────────
    function renderGameComplete() {
      return `
        <div class="end-screen">
          <div class="end-label">Game Complete</div>
          <div class="end-title">That's a wrap.</div>
          <div class="end-divider"></div>
          <div class="end-message">${escapeHtml(playerNames.p1)} &amp; ${escapeHtml(playerNames.p2)}<br>thanks for playing.</div>
          <button class="btn-end" id="play-again-btn">Play Again</button>
        </div>
      `
    }

    // ── Bind: Resume ──────────────────────────────────────────
    function bindResume() {
      document.getElementById('continue-btn').addEventListener('click', () => {
        if (loadState()) {
          render()
        } else {
          screen = 'setup'
          render()
        }
      })
      document.getElementById('startover-btn').addEventListener('click', () => {
        localStorage.removeItem('wnrs_save')
        screen = 'setup'
        render()
      })
    }

    // ── Bind: Setup ───────────────────────────────────────────
    function bindSetup() {
      let qty = Math.min(5, computedMax)
      const qtyEl = document.getElementById('qty')
      document.getElementById('qty-up').addEventListener('click', () => {
        if (qty < computedMax) { qty++; qtyEl.value = qty }
      })
      document.getElementById('qty-down').addEventListener('click', () => {
        if (qty > 5) { qty--; qtyEl.value = qty }
      })

      document.getElementById('start-btn').addEventListener('click', () => {
        const p1 = document.getElementById('p1').value.trim()
        const p2 = document.getElementById('p2').value.trim()
        const err = document.getElementById('setup-error')
        if (!p1 || !p2) { err.textContent = 'Both names are required.'; return }
        err.textContent = ''
        playerNames = { p1, p2 }
        questionsPerLevel = qty
        p1GoesFirst = true
        currentLevel = 1
        digDeeper = { p1: true, p2: true }
        localStorage.removeItem('wnrs_save')
        screen = 'instructions'
        render()
      })
    }

    // ── Bind: Instructions ────────────────────────────────────
    function bindInstructions() {
      document.getElementById('lets-play-btn').addEventListener('click', () => {
        startLevel(1)
      })
    }

    // ── Navigation ────────────────────────────────────────────
    function navigate(dir) {
      if (dir === 'prev') {
        if (currentIndex > 0) {
          stopTimer()
          currentIndex--
          saveState()
          render()
        }
      } else {
        if (currentIndex < currentDeck.length - 1) {
          stopTimer()
          currentIndex++
          saveState()
          render()
        } else {
          stopTimer()
          if (currentLevel < 3) {
            if (currentDeck.length % 2 !== 0) p1GoesFirst = !p1GoesFirst
            screen = 'levelcomplete'
            saveState()
            render()
          } else {
            screen = 'finalcard'
            localStorage.removeItem('wnrs_save')
            render()
          }
        }
      }
    }

    function reroll() {
      if (remainingPool.length === 0) return
      const idx = Math.floor(Math.random() * remainingPool.length)
      currentDeck[currentIndex] = { text: remainingPool[idx], type: 'question' }
      remainingPool.splice(idx, 1)
      saveState()
      render()
    }

    // ── Timer ─────────────────────────────────────────────────
    function startTimer(duration) {
      timerRemaining = duration
      timerRunning   = true
      timerDone      = false
      timerInterval = setInterval(() => {
        timerRemaining--
        if (timerRemaining <= 0) {
          timerRemaining = 0
          timerRunning   = false
          timerDone      = true
          clearInterval(timerInterval)
          timerInterval  = null
          const timerBlock = document.querySelector('.timer-block')
          if (timerBlock) timerBlock.innerHTML = '<div class="timer-done">Time\'s up!</div>'
        } else {
          const display = document.querySelector('.timer-display')
          if (display) display.textContent = formatTime(timerRemaining)
        }
      }, 1000)
    }

    function stopTimer() {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null }
      timerRunning   = false
      timerDone      = false
      timerRemaining = 0
    }

    // ── Dig Deeper ────────────────────────────────────────────
    function useDigDeeper(player) {
      digDeeper[player] = false
      saveState()
      const banner = document.getElementById('dig-banner')
      const name = playerNames[player]
      banner.textContent = `${escapeHtml(name)} thinks you're holding back — go deeper.`
      banner.classList.add('visible')
      // Update button states immediately without full re-render
      const btn = document.getElementById(`dig-${player}-btn`)
      if (btn) btn.disabled = true
      setTimeout(() => banner.classList.remove('visible'), 2500)
      banner.onclick = () => banner.classList.remove('visible')
    }

    // ── Save / Load ───────────────────────────────────────────
    function saveState() {
      const state = {
        playerNames, questionsPerLevel,
        currentLevel, currentDeck, currentIndex,
        remainingPool, p1GoesFirst, digDeeper, screen
      }
      localStorage.setItem('wnrs_save', JSON.stringify(state))
    }

    function loadState() {
      const raw = localStorage.getItem('wnrs_save')
      if (!raw) return false
      try {
        const s = JSON.parse(raw)
        playerNames       = s.playerNames
        questionsPerLevel = s.questionsPerLevel
        currentLevel      = s.currentLevel
        currentDeck       = s.currentDeck
        currentIndex      = s.currentIndex
        remainingPool     = s.remainingPool
        p1GoesFirst       = s.p1GoesFirst
        digDeeper         = s.digDeeper || { p1: true, p2: true }
        screen            = s.screen
        return true
      } catch {
        localStorage.removeItem('wnrs_save')
        return false
      }
    }

    // ── Bind: Game ────────────────────────────────────────────
    function bindGame() {
      document.getElementById('prev-btn').addEventListener('click', () => navigate('prev'))
      document.getElementById('next-btn').addEventListener('click', () => navigate('next'))

      const rerollBtn = document.getElementById('reroll-btn')
      if (rerollBtn) rerollBtn.addEventListener('click', reroll)

      const timerStartBtn = document.getElementById('timer-start-btn')
      if (timerStartBtn) {
        timerStartBtn.addEventListener('click', () => {
          const card = currentDeck[currentIndex]
          timerStartBtn.remove()
          startTimer(card.duration)
        })
      }

      const digP1 = document.getElementById('dig-p1-btn')
      if (digP1) digP1.addEventListener('click', () => useDigDeeper('p1'))

      const digP2 = document.getElementById('dig-p2-btn')
      if (digP2) digP2.addEventListener('click', () => useDigDeeper('p2'))
    }

    // ── Bind: Level Complete ──────────────────────────────────
    function bindLevelComplete() {
      document.getElementById('next-level-btn').addEventListener('click', () => {
        startLevel(currentLevel + 1)
      })
    }

    // ── Bind: Final Card ──────────────────────────────────────
    function bindFinalCard() {
      document.getElementById('continue-final-btn').addEventListener('click', () => {
        screen = 'gamecomplete'
        render()
      })
    }

    // ── Bind: Game Complete ───────────────────────────────────
    function bindGameComplete() {
      document.getElementById('play-again-btn').addEventListener('click', () => {
        localStorage.removeItem('wnrs_save')
        playerNames       = { p1: '', p2: '' }
        questionsPerLevel = Math.min(5, computedMax)
        currentLevel      = 1
        currentDeck       = []
        currentIndex      = 0
        remainingPool     = []
        p1GoesFirst       = true
        digDeeper         = { p1: true, p2: true }
        screen            = 'setup'
        render()
      })
    }

    // ── Fisher-Yates Shuffle ──────────────────────────────────
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1))
        ;[arr[i], arr[j]] = [arr[j], arr[i]]
      }
      return arr
    }

    // ── Deck Building ─────────────────────────────────────────
    function buildDeck(levelKey) {
      const level = QUESTIONS[levelKey]

      // Wild card count: 1 per 5 questions, minimum 1
      const wildcardCount = Math.max(1, Math.floor(questionsPerLevel / 5))

      // Shuffle and split regular questions
      const shuffledQuestions = shuffle([...level.questions])
      const selected = shuffledQuestions.slice(0, questionsPerLevel)
      remainingPool = shuffledQuestions.slice(questionsPerLevel)

      // Select wild cards (without replacement)
      const shuffledWild = shuffle([...level.wildcards])
      const selectedWild = shuffledWild.slice(0, Math.min(wildcardCount, shuffledWild.length))

      // Map to card objects
      const questionCards = selected.map(text => ({ text, type: 'question' }))
      const wildcardCards = selectedWild.map(wc => ({
        text: wc.text,
        type: 'wildcard',
        timed: wc.timed,
        ...(wc.timed ? { duration: wc.duration } : {})
      }))

      // Shuffle questions + wildcards together
      const mixed = shuffle([...questionCards, ...wildcardCards])

      // Prepend reminder card if this level has one
      if (level.reminder) {
        return [{ text: level.reminder, type: 'reminder' }, ...mixed]
      }
      return mixed
    }

    // ── Start Level ───────────────────────────────────────────
    function startLevel(level) {
      currentLevel = level
      currentIndex = 0
      digDeeper    = { p1: true, p2: true }
      stopTimer()
      currentDeck = buildDeck(`level${level}`)
      screen = 'game'
      saveState()
      render()
    }

    boot()
  </script>
</body>
</html>
